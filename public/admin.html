<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あとらす 管理画面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #1a1a2e;
      color: #e8e0d0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #0d1b4a 0%, #1a237e 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #b8860b44;
    }
    header h1 { font-size: 18px; color: #daa520; letter-spacing: 1px; }
    header span { font-size: 12px; color: #888; }
    .container { max-width: 1080px; margin: 0 auto; padding: 24px 16px; }

    /* ログイン */
    #login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 80vh; gap: 16px;
    }
    #login-screen h2 { color: #daa520; font-size: 20px; }
    #login-screen input {
      width: 280px; padding: 12px 16px; border-radius: 8px;
      border: 1px solid #b8860b44; background: #16213e;
      color: #e8e0d0; font-size: 15px; outline: none;
    }
    #login-screen input:focus { border-color: #b8860b; }
    #login-error { color: #e57373; font-size: 13px; }

    /* タブ */
    .tabs { display: flex; gap: 4px; margin-bottom: 0; border-bottom: none; }
    .tab-btn {
      padding: 10px 20px; background: none; border: none;
      color: #888; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab-btn.active { color: #daa520; border-bottom-color: #daa520; }
    .tab-btn:hover { color: #e8e0d0; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* カード */
    .card {
      background: rgba(255,248,235,0.04);
      border: 1px solid #b8860b33;
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .card h3 { font-size: 15px; color: #daa520; margin-bottom: 12px; }

    /* テーブル */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 8px 10px;
      background: rgba(184,134,11,0.12); color: #daa520;
      border-bottom: 1px solid #b8860b33; white-space: nowrap;
    }
    td { padding: 8px 10px; border-bottom: 1px solid #ffffff0d; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.03); }

    /* スコア重み */
    .weight-row {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid #ffffff0d;
    }
    .weight-row:last-of-type { border-bottom: none; }
    .weight-label { width: 90px; font-size: 14px; }
    .weight-row input[type=range] { flex: 1; accent-color: #b8860b; cursor: pointer; }
    .weight-pct { width: 50px; text-align: right; font-weight: 600; color: #daa520; font-size: 14px; }
    .weight-row input[type=number] {
      width: 60px; padding: 4px 8px; background: #16213e;
      border: 1px solid #b8860b44; border-radius: 6px;
      color: #e8e0d0; font-size: 14px; text-align: center;
    }
    .weight-total { text-align: right; font-size: 13px; margin-top: 8px; color: #888; }
    .weight-total.warn { color: #e57373; }

    /* toggle */
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #444; border-radius: 24px; transition: .2s;
    }
    .toggle-slider:before {
      content: ""; position: absolute;
      width: 18px; height: 18px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .toggle-slider { background: #b8860b; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

    /* 優先度 */
    input.priority-input {
      width: 64px; padding: 4px 8px; background: #16213e;
      border: 1px solid #b8860b44; border-radius: 6px;
      color: #e8e0d0; font-size: 13px; text-align: center;
    }
    input.url-input {
      width: 180px; padding: 4px 8px; background: #16213e;
      border: 1px solid #b8860b44; border-radius: 6px;
      color: #e8e0d0; font-size: 12px;
    }

    /* ツールボタン */
    .btn-tool {
      padding: 7px 14px; background: rgba(255,255,255,0.06);
      border: 1px solid #444; border-radius: 7px; color: #ccc;
      font-size: 12px; cursor: pointer; white-space: nowrap;
      transition: all .15s;
    }
    .btn-tool:hover { background: rgba(255,255,255,0.12); color: #e8e0d0; }
    .btn-migrate { border-color: #b8860b55; color: #daa520; }
    .btn-migrate:hover { background: rgba(184,134,11,0.15); }

    /* ボタン */
    .btn-save {
      display: block; margin: 20px 0 0 auto;
      padding: 10px 28px; background: linear-gradient(135deg, #b8860b, #daa520);
      border: none; border-radius: 8px; color: #1a1a2e;
      font-weight: 700; font-size: 15px; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-add {
      padding: 8px 18px; background: rgba(184,134,11,0.15);
      border: 1px solid #b8860b; border-radius: 8px; color: #daa520;
      font-size: 13px; cursor: pointer; margin-bottom: 14px;
      transition: all .15s;
    }
    .btn-add:hover { background: rgba(184,134,11,0.3); }
    .btn-edit {
      padding: 4px 10px; background: rgba(255,255,255,0.07);
      border: 1px solid #555; border-radius: 5px; color: #ccc;
      font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .btn-edit:hover { background: rgba(255,255,255,0.15); color: #e8e0d0; }
    .btn-delete {
      padding: 4px 10px; background: rgba(229,115,115,0.1);
      border: 1px solid #e5737355; border-radius: 5px; color: #e57373;
      font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .btn-delete:hover { background: rgba(229,115,115,0.25); }

    /* タグ */
    .tag {
      display: inline-block; background: rgba(184,134,11,0.15);
      border: 1px solid #b8860b44; border-radius: 4px;
      padding: 2px 6px; font-size: 11px; color: #daa520; margin: 1px;
    }
    .tag.worry { background: rgba(107,91,158,0.2); border-color: #6b5b9e55; color: #9b8bc8; }

    /* トースト */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1b5e20; color: #c8e6c9;
      padding: 12px 20px; border-radius: 8px; font-size: 14px;
      box-shadow: 0 4px 12px #00000066; white-space: pre-line;
      transition: opacity .3s; opacity: 0; pointer-events: none; z-index: 2000;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: #b71c1c; color: #ffcdd2; }

    /* ローディング */
    .loading { text-align: center; padding: 40px; color: #888; }

    /* バー（石プロファイル） */
    .mini-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .mini-bar span { width: 20px; font-size: 10px; color: #888; text-align: right; }
    .mini-bar-track { flex: 1; height: 5px; background: #333; border-radius: 3px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }

    /* モーダル */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: none; align-items: flex-start; justify-content: center;
      z-index: 1000; padding: 40px 16px; overflow-y: auto;
    }
    #modal-overlay.show { display: flex; }
    #modal-box {
      background: #16213e; border: 1px solid #b8860b55; border-radius: 14px;
      padding: 24px; width: 100%; max-width: 660px;
    }
    #modal-title { font-size: 16px; color: #daa520; font-weight: 700; margin-bottom: 20px; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
    .form-row input[type=text],
    .form-row input[type=number],
    .form-row input[type=url],
    .form-row textarea,
    .form-row select {
      width: 100%; padding: 8px 10px; background: #0d1b4a;
      border: 1px solid #b8860b44; border-radius: 6px;
      color: #e8e0d0; font-size: 14px; outline: none;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      border-color: #b8860b;
    }
    .form-row textarea { height: 64px; resize: vertical; }
    .form-row input[readonly] { color: #888; cursor: not-allowed; }
    .form-section {
      font-size: 12px; color: #daa520; margin: 18px 0 10px;
      border-bottom: 1px solid #b8860b33; padding-bottom: 5px;
    }
    .form-grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .form-grid8 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid4 > div label,
    .form-grid8 > div label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
    .form-grid4 > div input,
    .form-grid8 > div input {
      width: 100%; padding: 5px 7px; background: #0d1b4a;
      border: 1px solid #b8860b44; border-radius: 5px;
      color: #e8e0d0; font-size: 13px; text-align: center; outline: none;
    }
    .form-grid4 > div input:focus,
    .form-grid8 > div input:focus { border-color: #b8860b; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px;
      border-top: 1px solid #b8860b22; padding-top: 16px;
    }
    .modal-actions button {
      padding: 9px 22px; border-radius: 7px; font-size: 14px; cursor: pointer;
      transition: opacity .15s;
    }
    #modal-cancel {
      background: rgba(255,255,255,0.07); border: 1px solid #555; color: #ccc;
    }
    #modal-submit {
      background: linear-gradient(135deg, #b8860b, #daa520);
      border: none; color: #1a1a2e; font-weight: 700;
    }
    #modal-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* パーツ行 */
    .part-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
      background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px;
    }
    .part-row select, .part-row input {
      flex: 1; padding: 6px 8px; background: #0d1b4a;
      border: 1px solid #b8860b44; border-radius: 5px;
      color: #e8e0d0; font-size: 13px; outline: none;
    }
    .part-row select:focus, .part-row input:focus { border-color: #b8860b; }
    .part-row input[type=number] { max-width: 70px; text-align: center; }
    .btn-part-del {
      padding: 4px 8px; background: rgba(229,115,115,0.15);
      border: 1px solid #e5737355; border-radius: 4px; color: #e57373;
      font-size: 12px; cursor: pointer; flex-shrink: 0;
    }
    .btn-part-add {
      padding: 6px 14px; background: rgba(184,134,11,0.12);
      border: 1px solid #b8860b44; border-radius: 6px; color: #daa520;
      font-size: 12px; cursor: pointer; margin-top: 4px;
    }
    .btn-part-add:hover { background: rgba(184,134,11,0.25); }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ あとらす 管理画面</h1>
    <span id="header-info"></span>
  </header>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <h2>🔐 ログイン</h2>
    <input type="password" id="pw-input" placeholder="管理パスワード" autocomplete="current-password">
    <button class="btn-save" onclick="doLogin()" style="margin:0;">ログイン</button>
    <span id="login-error"></span>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen" style="display:none;">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('score')">スコア重み</button>
          <button class="tab-btn" onclick="switchTab('products')">商品マスター</button>
          <button class="tab-btn" onclick="switchTab('stones')">石マスター</button>
          <button class="tab-btn" onclick="switchTab('combos')">組み合わせ</button>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn-tool" onclick="clearCache()">🔄 キャッシュクリア</button>
          <button class="btn-tool btn-migrate" onclick="migrateToSheets()">📤 シートへ移行</button>
        </div>
      </div>
      <div style="border-bottom:1px solid #333;margin-bottom:20px;"></div>

      <!-- スコア重み -->
      <div id="tab-score" class="tab-panel active">
        <div class="card">
          <h3>マッチングスコア重み</h3>
          <p style="font-size:12px;color:#888;margin-bottom:16px;">合計が100%になるよう自動正規化されます。</p>
          <div id="weight-editor"><div class="loading">読み込み中...</div></div>
          <div id="weight-total" class="weight-total"></div>
          <button class="btn-save" onclick="saveScoreWeights()">保存する</button>
        </div>
      </div>

      <!-- 商品マスター -->
      <div id="tab-products" class="tab-panel">
        <div class="card">
          <h3>商品マスター</h3>
          <p style="font-size:12px;color:#888;margin-bottom:12px;">
            WooCommerce商品は編集のみ可。外部商品（X-ID）は追加・削除も可能です。<br>
            有効/無効・優先度の一括保存はテーブル下の「保存する」から。
          </p>
          <button class="btn-add" onclick="openProductModal(null)">＋ 外部商品を追加</button>
          <div id="product-table" class="table-wrap"><div class="loading">読み込み中...</div></div>
          <button class="btn-save" onclick="saveProducts()">有効/優先度を保存</button>
        </div>
      </div>

      <!-- 石マスター -->
      <div id="tab-stones" class="tab-panel">
        <div class="card">
          <h3>石マスター</h3>
          <button class="btn-add" onclick="openStoneModal(null)">＋ 石を追加</button>
          <div id="stone-table" class="table-wrap"><div class="loading">読み込み中...</div></div>
        </div>
      </div>

      <!-- 組み合わせ -->
      <div id="tab-combos" class="tab-panel">
        <div class="card">
          <h3>石の組み合わせ効果</h3>
          <button class="btn-add" onclick="openComboModal(null, null)">＋ 組み合わせを追加</button>
          <div id="combo-table" class="table-wrap"><div class="loading">読み込み中...</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- モーダル -->
  <div id="modal-overlay" onclick="onOverlayClick(event)">
    <div id="modal-box">
      <div id="modal-title"></div>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" onclick="closeModal()">キャンセル</button>
        <button id="modal-submit" onclick="submitModal()">保存する</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let password = '';
    let masterData = null;
    let _modalSubmitFn = null;

    // --- ログイン ---
    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      password = document.getElementById('pw-input').value.trim();
      if (!password) return;
      try {
        const res = await apiFetch('/api/admin/master');
        if (res.ok) {
          masterData = await res.json();
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('main-screen').style.display = 'block';
          document.getElementById('header-info').textContent = '管理者ログイン中';
          renderAll();
        } else {
          document.getElementById('login-error').textContent = 'パスワードが正しくありません';
        }
      } catch (e) {
        document.getElementById('login-error').textContent = '接続エラー: ' + e.message;
      }
    }

    function apiFetch(url, method = 'GET', body = null) {
      const opts = {
        method,
        headers: { 'Authorization': 'Bearer ' + password, 'Content-Type': 'application/json' },
      };
      if (body) opts.body = JSON.stringify(body);
      return fetch(url, opts);
    }

    // --- タブ切り替え ---
    function switchTab(name) {
      const names = ['score', 'products', 'stones', 'combos'];
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', names[i] === name);
      });
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
    }

    // --- 全描画 ---
    function renderAll() {
      renderScoreWeights();
      renderProducts();
      renderStones();
      renderCombos();
    }

    async function reloadMaster() {
      const r = await apiFetch('/api/admin/master');
      masterData = await r.json();
      renderAll();
    }

    // ===== スコア重み =====
    function renderScoreWeights() {
      const w = masterData.score_weights;
      const labels = { element: '星座相性', aura: 'オーラ', theme: 'テーマ', worry: '悩み' };
      const colors = { element: '#c8860b', aura: '#9b6b3a', theme: '#7a9e4e', worry: '#6b5b9e' };
      let html = '';
      for (const [k, v] of Object.entries(labels)) {
        const pct = Math.round((w[k] || 0) * 100);
        html += `
          <div class="weight-row">
            <span class="weight-label">${v}</span>
            <input type="range" min="0" max="100" value="${pct}"
              id="w-range-${k}" oninput="syncWeight('${k}', this.value)">
            <input type="number" min="0" max="100" value="${pct}"
              id="w-num-${k}" oninput="syncWeight('${k}', this.value)" style="width:60px;">
            <span style="font-size:11px;color:#888;">%</span>
          </div>`;
      }
      document.getElementById('weight-editor').innerHTML = html;
      updateWeightTotal();
    }

    function syncWeight(key, val) {
      document.getElementById('w-range-' + key).value = val;
      document.getElementById('w-num-' + key).value = val;
      updateWeightTotal();
    }

    function updateWeightTotal() {
      const keys = ['element', 'aura', 'theme', 'worry'];
      const total = keys.reduce((s, k) => s + (parseInt(document.getElementById('w-num-' + k)?.value) || 0), 0);
      const el = document.getElementById('weight-total');
      el.textContent = `合計: ${total}%（保存時に自動正規化）`;
      el.className = 'weight-total' + (total === 100 ? '' : ' warn');
    }

    async function saveScoreWeights() {
      const keys = ['element', 'aura', 'theme', 'worry'];
      const updates = {};
      for (const k of keys) {
        const val = parseInt(document.getElementById('w-num-' + k)?.value) || 0;
        updates[`score_weight_${k}`] = (val / 100).toFixed(2);
      }
      await saveConfig(updates);
    }

    // ===== 商品マスター =====
    function renderProducts() {
      const products = masterData.products || [];
      let html = `<table><thead><tr>
        <th>商品ID</th><th>SKU</th><th>石構成</th><th>性別</th>
        <th>有効</th><th>優先度</th><th>商品URL</th><th>操作</th>
      </tr></thead><tbody>`;
      for (const p of products) {
        const stonesHtml = (p.stone_names || []).join(' × ');
        const checked = p.enabled ? 'checked' : '';
        const isExternal = String(p.product_id || '').startsWith('X');
        const deleteBtn = isExternal
          ? `<button class="btn-delete" onclick="deleteProduct('${p.product_id}')">削除</button>`
          : '';
        html += `<tr>
          <td style="font-size:11px;color:${isExternal ? '#daa520' : '#aaa'};">${p.product_id}</td>
          <td style="font-size:11px;color:#aaa;">${p.sku || '—'}</td>
          <td>${stonesHtml}</td>
          <td>${p.gender_mode}</td>
          <td><label class="toggle"><input type="checkbox" id="p-en-${p.product_id}" ${checked}><span class="toggle-slider"></span></label></td>
          <td><input class="priority-input" type="number" step="0.1" min="0.1" max="3.0" id="p-pr-${p.product_id}" value="${p.priority_weight}"></td>
          <td><input class="url-input" type="text" id="p-url-${p.product_id}" value="${p.product_url || ''}" placeholder="（なし）"></td>
          <td style="white-space:nowrap;display:flex;gap:4px;">
            <button class="btn-edit" onclick="openProductModal('${p.product_id}')">編集</button>
            ${deleteBtn}
          </td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('product-table').innerHTML = html;
    }

    async function saveProducts() {
      const btn = event.target;
      btn.disabled = true; btn.textContent = '保存中...';
      try {
        // 1. enabled/priority は config 経由で保存
        const configUpdates = {};
        for (const p of masterData.products) {
          const pid = p.product_id;
          const en = document.getElementById(`p-en-${pid}`)?.checked;
          const pr = parseFloat(document.getElementById(`p-pr-${pid}`)?.value) || 1.0;
          configUpdates[`product_${pid}_enabled`] = en ? 'true' : 'false';
          configUpdates[`product_${pid}_priority`] = pr.toFixed(2);
        }
        const res = await apiFetch('/api/admin/config', 'POST', { updates: configUpdates });

        // 2. product_url は商品マスターシートへ直接保存
        for (const p of masterData.products) {
          const pid = p.product_id;
          const newUrl = document.getElementById(`p-url-${pid}`)?.value || '';
          if (newUrl !== (p.product_url || '')) {
            const productData = { ...p, product_url: newUrl };
            await apiFetch(`/api/admin/product/${pid}`, 'PUT', { product_data: productData });
          }
        }

        const data = await res.json();
        if (res.ok) {

      const idx = _partCounter++;

      const row = document.getElementById(`part-row-${idx}`);
      if (row) row.remove();

    async function saveProduct(isNew, productId) {
      const parts = [];
      document.querySelectorAll('[id^="part-row-"]').forEach(row => {
        const idx = row.id.replace('part-row-', '');
        const stoneId = document.getElementById(`part-stone-${idx}`)?.value;
        const role = document.getElementById(`part-role-${idx}`)?.value;
        const size = parseInt(document.getElementById(`part-size-${idx}`)?.value) || 8;
        if (stoneId && role) {
          parts.push({ stone_id: stoneId, role, size });
        }
      });
      if (parts.length === 0) { showToast('❌ パーツを1つ以上追加してください', true); return; }

      const wooId = document.getElementById('f-wid').value;
      const productData = {
        woo_product_id: parseInt(wooId) || 0,
        sku:            document.getElementById('f-sku').value.trim(),
        parts,
        gender_mode:    document.getElementById('f-gender').value,
        enabled:        document.getElementById('f-enabled').checked,
        priority_weight: parseFloat(document.getElementById('f-priority').value) || 1.0,
        product_url:    document.getElementById('f-purl').value.trim(),
      };

      let res;
      if (isNew) {
        res = await apiFetch('/api/admin/product', 'POST', { product_data: productData });
      } else {
        res = await apiFetch(`/api/admin/product/${productId}`, 'PUT', { product_data: productData });
      }
      const data = await res.json();
      if (res.ok) {
        showToast(isNew ? `✅ 追加しました（ID: ${data.product_id}）` : '✅ 保存しました');
        closeModal();
        await reloadMaster();
      } else {
        showToast('❌ ' + data.error, true);
      }
    }

    // --- 保存共通 ---
    async function saveConfig(updates) {
      const res = await apiFetch('/api/admin/config', 'POST', { updates });
      return res;
    }

    async function clearCache() {
      try {
        const res = await apiFetch('/api/admin/clear-cache', 'POST');
        const data = await res.json();
        showToast(res.ok ? '✅ キャッシュをクリアしました' : '❌ ' + data.error, !res.ok);
        if (res.ok) await reloadMaster();
      } catch (e) { showToast('❌ エラー: ' + e.message, true); }
    }

    async function migrateToSheets() {
      if (!confirm('Pythonファイルのマスターデータをシートに書き込みます。\n既存のシートデータは上書きされます。続けますか？')) return;
      try {
        const res = await apiFetch('/api/admin/migrate-to-sheets', 'POST');
        const data = await res.json();
        const lines = Object.entries(data.results || {}).map(([k, v]) => `${k}: ${v}`).join('\n');
        const errLines = (data.errors || []).join('\n');
        showToast(
          data.status === 'ok' ? `✅ 移行完了\n${lines}` : `⚠️ 一部失敗\n${lines}\n${errLines}`,
          data.status !== 'ok'
        );
        if (data.status !== 'error') await reloadMaster();
      } catch (e) { showToast('❌ エラー: ' + e.message, true); }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show' + (isError ? ' error' : '');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = ''; }, 3500);
    }

    // HTML特殊文字エスケープ
    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
